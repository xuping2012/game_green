<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>植物大战僵尸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            background: linear-gradient(45deg, #4CAF50, #8BC34A);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .plant-selection {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .plant-selection h3 {
            margin-bottom: 15px;
            font-size: 1.2rem;
            text-align: center;
        }

        .plant-card {
            background: linear-gradient(135deg, rgba(76,175,80,0.3), rgba(139,195,58,0.3));
            border: 2px solid rgba(76,175,80,0.5);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .plant-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(76,175,80,0.4);
        }

        .plant-card.selected {
            border-color: #FFD700;
            box-shadow: 0 0 15px rgba(255,215,0,0.5);
        }

        .plant-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .plant-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .plant-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .plant-cost {
            color: #FFD700;
            font-size: 0.9rem;
        }

        .game-canvas-container {
            position: relative;
        }

        #gameCanvas {
            border: 3px solid rgba(76,175,80,0.5);
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            cursor: crosshair;
        }

        .sun-counter {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255,215,0,0.2);
            border: 2px solid #FFD700;
            border-radius: 20px;
            padding: 10px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #FFD700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sun-icon {
            font-size: 1.5rem;
        }

        .wave-info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255,0,0,0.2);
            border: 2px solid #ff4444;
            border-radius: 20px;
            padding: 10px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #ff4444;
        }

        .game-info {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            min-width: 200px;
        }

        .game-info h3 {
            margin-bottom: 15px;
            font-size: 1.2rem;
            text-align: center;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 5px;
        }

        .info-label {
            color: #aaa;
        }

        .info-value {
            font-weight: bold;
        }

        .controls {
            margin-top: 20px;
            text-align: center;
        }

        .btn {
            background: linear-gradient(135deg, #4CAF50, #8BC34A);
            border: none;
            border-radius: 8px;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(76,175,80,0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76,175,80,0.5);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .game-over-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 3px solid #4CAF50;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .game-over-title {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .game-over-title.win {
            color: #4CAF50;
        }

        .game-over-title.lose {
            color: #ff4444;
        }

        .game-over-stats {
            margin: 20px 0;
            font-size: 1.2rem;
        }

        .instructions {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .instructions h4 {
            margin-bottom: 10px;
            color: #4CAF50;
        }
    </style>
</head>
<body>
    <h1>🌻 植物大战僵尸 🧟</h1>
    
    <div class="game-container">
        <div class="plant-selection">
            <h3>植物选择</h3>
            <div class="plant-card" onclick="selectPlant('sunflower')" id="sunflower-card">
                <div class="plant-icon">🌻</div>
                <div class="plant-name">向日葵</div>
                <div class="plant-cost">☀️ 50 阳光</div>
            </div>
            <div class="plant-card" onclick="selectPlant('peashooter')" id="peashooter-card">
                <div class="plant-icon">🌱</div>
                <div class="plant-name">豌豆射手</div>
                <div class="plant-cost">☀️ 100 阳光</div>
            </div>
            <div class="plant-card" onclick="selectPlant('wallnut')" id="wallnut-card">
                <div class="plant-icon">🥔</div>
                <div class="plant-name">坚果墙</div>
                <div class="plant-cost">☀️ 50 阳光</div>
            </div>
            <div class="plant-card" onclick="selectPlant('cobcannon')" id="cobcannon-card">
                <div class="plant-icon">🌽</div>
                <div class="plant-name">玉米加农炮</div>
                <div class="plant-cost">☀️ 200 阳光</div>
            </div>
            <div class="plant-card" onclick="selectPlant('doomshroom')" id="doomshroom-card">
                <div class="plant-icon">🍄</div>
                <div class="plant-name">毁灭菇</div>
                <div class="plant-cost">☀️ 150 阳光</div>
            </div>
            <div class="plant-card" onclick="selectPlant('cherrybomb')" id="cherrybomb-card">
                <div class="plant-icon">🍒</div>
                <div class="plant-name">樱桃炸弹</div>
                <div class="plant-cost">☀️ 150 阳光</div>
            </div>
        </div>

        <div class="game-canvas-container">
            <canvas id="gameCanvas" width="1100" height="600"></canvas>
            <div class="sun-counter">
                <span class="sun-icon">☀️</span>
                <span id="sunCount">150</span>
            </div>
            <div class="wave-info">
                波次: <span id="waveCount">1</span> / 7
            </div>
        </div>

        <div class="game-info">
            <h3>游戏信息</h3>
            <div class="info-item">
                <span class="info-label">得分</span>
                <span class="info-value" id="score">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">僵尸击杀</span>
                <span class="info-value" id="zombiesKilled">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">植物数量</span>
                <span class="info-value" id="plantCount">0</span>
            </div>
            <div class="controls">
                <button class="btn" onclick="startGame()" id="startBtn">开始游戏</button>
            </div>
            <div class="instructions">
                <h4>游戏说明</h4>
                <p>• 点击植物卡片选择要种植的植物</p>
                <p>• 点击网格种植植物</p>
                <p>• 点击阳光收集资源</p>
                <p>• 防止僵尸到达左侧</p>
                <p>• 存活7波获胜</p>
            </div>
        </div>
    </div>

    <div class="game-over-overlay" id="gameOverOverlay">
        <div class="game-over-content">
            <div class="game-over-title" id="gameOverTitle">游戏结束</div>
            <div class="game-over-stats" id="gameOverStats"></div>
            <button class="btn" onclick="restartGame()">重新开始</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 游戏配置
        const GRID_ROWS = 6;
        const GRID_COLS = 11;
        const CELL_WIDTH = 100;
        const CELL_HEIGHT = 100;
        const GRID_OFFSET_X = 0;
        const GRID_OFFSET_Y = 0;

        // 僵尸类型
        const ZOMBIE_TYPES = {
            normal: {
                name: '普通僵尸',
                emoji: '🧟',
                healthMultiplier: 1.0,
                speedMultiplier: 1.0,
                attackDamageMultiplier: 1.0
            },
            buckethead: {
                name: '铁桶僵尸',
                emoji: '🧟‍♂️',
                healthMultiplier: 2.5,
                speedMultiplier: 0.7,
                attackDamageMultiplier: 1.2
            },
            conehead: {
                name: '路障僵尸',
                emoji: '🧟',
                healthMultiplier: 1.8,
                speedMultiplier: 0.9,
                attackDamageMultiplier: 1.1
            }
        };

        // 游戏状态
        let gameRunning = false;
        let sun = 250;
        let score = 0;
        let zombiesKilled = 0;
        let currentWave = 0;
        let maxWaves = 7;
        let selectedPlant = null;
        let plants = [];
        let zombies = [];
        let bullets = [];
        let suns = [];
        let lastTime = 0;
        let spawnTimer = 0;
        let sunSpawnTimer = 0;
        let waveCompleteTimer = 0;
        let zombiesInWave = 0;
        let zombiesSpawnedInWave = 0;
        let preparationTime = 0; // 准备时间，给玩家时间种植植物

        // 植物类型
        const PLANT_TYPES = {
            sunflower: {
                name: '向日葵',
                cost: 50,
                health: 100,
                emoji: '🌻',
                color: '#FFD700',
                attackDamage: 0,
                attackSpeed: 0,
                sunProduction: 50,
                sunProductionInterval: 10000,
                special: null
            },
            peashooter: {
                name: '豌豆射手',
                cost: 100,
                health: 100,
                emoji: '🌱',
                color: '#4CAF50',
                attackDamage: 20,
                attackSpeed: 1500,
                sunProduction: 0,
                sunProductionInterval: 0,
                special: null
            },
            wallnut: {
                name: '坚果墙',
                cost: 50,
                health: 400,
                emoji: '🥔',
                color: '#8B4513',
                attackDamage: 0,
                attackSpeed: 0,
                sunProduction: 0,
                sunProductionInterval: 0,
                special: null
            },
            cobcannon: {
                name: '玉米加农炮',
                cost: 200,
                health: 150,
                emoji: '🌽',
                color: '#FFA500',
                attackDamage: 80,
                attackSpeed: 2000,
                sunProduction: 0,
                sunProductionInterval: 0,
                special: 'explosion'
            },
            doomshroom: {
                name: '毁灭菇',
                cost: 150,
                health: 100,
                emoji: '🍄',
                color: '#8B0000',
                attackDamage: 150,
                attackSpeed: 0,
                sunProduction: 0,
                sunProductionInterval: 0,
                special: 'doom'
            },
            cherrybomb: {
                name: '樱桃炸弹',
                cost: 150,
                health: 100,
                emoji: '🍒',
                color: '#DC143C',
                attackDamage: 120,
                attackSpeed: 0,
                sunProduction: 0,
                sunProductionInterval: 0,
                special: 'cherry'
            }
        };

        // 初始化网格
        function initGrid() {
            ctx.fillStyle = '#2d5a27';
            ctx.fillRect(GRID_OFFSET_X, GRID_OFFSET_Y, GRID_COLS * CELL_WIDTH, GRID_ROWS * CELL_HEIGHT);
            
            for (let row = 0; row < GRID_ROWS; row++) {
                for (let col = 0; col < GRID_COLS; col++) {
                    const x = GRID_OFFSET_X + col * CELL_WIDTH;
                    const y = GRID_OFFSET_Y + row * CELL_HEIGHT;
                    
                    // 绘制草地格子
                    ctx.fillStyle = (row + col) % 2 === 0 ? '#3d7a37' : '#2d6a27';
                    ctx.fillRect(x, y, CELL_WIDTH, CELL_HEIGHT);
                    
                    // 绘制格子边框
                    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x, y, CELL_WIDTH, CELL_HEIGHT);
                }
            }
        }

        // 绘制植物
        function drawPlant(plant) {
            const x = plant.col * CELL_WIDTH + CELL_WIDTH / 2;
            const y = plant.row * CELL_HEIGHT + CELL_HEIGHT / 2;
            
            // 绘制植物背景
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.arc(x, y, 35, 0, Math.PI * 2);
            ctx.fill();
            
            // 绘制植物
            ctx.font = '50px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(plant.type.emoji, x, y);
            
            // 绘制血条
            const healthPercent = plant.health / plant.type.health;
            const barWidth = 60;
            const barHeight = 6;
            const barX = x - barWidth / 2;
            const barY = y + 40;
            
            ctx.fillStyle = '#333';
            ctx.fillRect(barX, barY, barWidth, barHeight);
            
            ctx.fillStyle = healthPercent > 0.5 ? '#4CAF50' : healthPercent > 0.25 ? '#FFC107' : '#f44336';
            ctx.fillRect(barX, barY, barWidth * healthPercent, barHeight);
        }

        // 绘制僵尸
        function drawZombie(zombie) {
            const x = zombie.x;
            const y = zombie.y + CELL_HEIGHT / 2;

            // 绘制僵尸背景
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.arc(x, y, 35, 0, Math.PI * 2);
            ctx.fill();

            // 绘制僵尸
            ctx.font = '50px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(zombie.type.emoji, x, y);

            // 绘制血条
            const healthPercent = zombie.health / zombie.maxHealth;
            const barWidth = 60;
            const barHeight = 6;
            const barX = x - barWidth / 2;
            const barY = y + 40;

            ctx.fillStyle = '#333';
            ctx.fillRect(barX, barY, barWidth, barHeight);

            ctx.fillStyle = healthPercent > 0.5 ? '#4CAF50' : healthPercent > 0.25 ? '#FFC107' : '#f44336';
            ctx.fillRect(barX, barY, barWidth * healthPercent, barHeight);
        }

        // 绘制子弹
        function drawBullet(bullet) {
            const x = bullet.x;
            const y = bullet.y;
            
            ctx.fillStyle = '#4CAF50';
            ctx.beginPath();
            ctx.arc(x, y, 8, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#81C784';
            ctx.beginPath();
            ctx.arc(x - 2, y - 2, 4, 0, Math.PI * 2);
            ctx.fill();
        }

        // 绘制阳光
        function drawSun(sun) {
            const x = sun.x;
            const y = sun.y;
            
            // 绘制阳光光晕
            ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
            ctx.beginPath();
            ctx.arc(x, y, 30 + Math.sin(Date.now() / 200) * 5, 0, Math.PI * 2);
            ctx.fill();
            
            // 绘制阳光
            ctx.font = '40px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('☀️', x, y);
        }

        // 更新游戏状态
        function update(deltaTime) {
            if (!gameRunning) return;

            // 更新植物
            plants.forEach(plant => {
                // 向日葵生产阳光
                if (plant.type.sunProduction > 0) {
                    plant.sunTimer += deltaTime;
                    if (plant.sunTimer >= plant.type.sunProductionInterval) {
                        plant.sunTimer = 0;
                        createSun(
                            plant.col * CELL_WIDTH + CELL_WIDTH / 2,
                            plant.row * CELL_HEIGHT + CELL_HEIGHT / 2
                        );
                    }
                }

                // 毁灭菇：被僵尸触碰时直接带走两个僵尸
                if (plant.type.special === 'doom') {
                    const plantX = plant.col * CELL_WIDTH + CELL_WIDTH / 2;
                    const plantY = plant.row * CELL_HEIGHT + CELL_HEIGHT / 2;

                    // 检查是否有僵尸触碰
                    let touched = false;
                    zombies.forEach(zombie => {
                        const dx = zombie.x - plantX;
                        const dy = (zombie.y + CELL_HEIGHT / 2) - plantY;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        if (distance < 60) {
                            touched = true;
                        }
                    });

                    if (touched) {
                        // 找到最近的两个僵尸并直接带走
                        const plantCenterX = plant.col * CELL_WIDTH + CELL_WIDTH / 2;
                        const plantCenterY = plant.row * CELL_HEIGHT + CELL_HEIGHT / 2;

                        // 计算每个僵尸到毁灭菇的距离
                        const zombiesWithDistance = zombies.map(zombie => {
                            const dx = zombie.x - plantCenterX;
                            const dy = (zombie.y + CELL_HEIGHT / 2) - plantCenterY;
                            const distance = Math.sqrt(dx * dx + dy * dy);
                            return { zombie, distance };
                        });

                        // 按距离排序
                        zombiesWithDistance.sort((a, b) => a.distance - b.distance);

                        // 带走最近的两个僵尸
                        const zombiesToRemove = zombiesWithDistance.slice(0, 2);
                        zombiesToRemove.forEach(({ zombie }) => {
                            zombies = zombies.filter(z => z !== zombie);
                            zombiesKilled++;
                            score += 100;
                        });

                        // 毁灭菇使用后消失
                        plants = plants.filter(p => p !== plant);
                        updateUI();
                        return;
                    }
                }

                // 樱桃炸弹：被僵尸触碰时纵向爆炸
                if (plant.type.special === 'cherry') {
                    const plantX = plant.col * CELL_WIDTH + CELL_WIDTH / 2;
                    const plantY = plant.row * CELL_HEIGHT + CELL_HEIGHT / 2;

                    // 检查是否有僵尸触碰
                    let touched = false;
                    zombies.forEach(zombie => {
                        const dx = zombie.x - plantX;
                        const dy = (zombie.y + CELL_HEIGHT / 2) - plantY;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        if (distance < 60) {
                            touched = true;
                        }
                    });

                    if (touched) {
                        // 纵向爆炸效果：只影响同一列的僵尸
                        const plantCol = plant.col;
                        zombies.forEach(zombie => {
                            // 检查僵尸是否在同一列
                            const zombieCol = Math.floor(zombie.x / CELL_WIDTH);
                            if (zombieCol === plantCol) {
                                zombie.health -= plant.type.attackDamage;
                                if (zombie.health <= 0) {
                                    zombies = zombies.filter(z => z !== zombie);
                                    zombiesKilled++;
                                    score += 100;
                                }
                            }
                        });
                        // 樱桃炸弹爆炸后消失
                        plants = plants.filter(p => p !== plant);
                        updateUI();
                        return;
                    }
                }

                // 玉米加农炮和豌豆射手攻击
                if (plant.type.attackDamage > 0 && plant.type.special !== 'doom' && plant.type.special !== 'cherry') {
                    plant.attackTimer += deltaTime;
                    if (plant.attackTimer >= plant.type.attackSpeed) {
                        plant.attackTimer = 0;

                        // 检查是否有僵尸在同一行
                        const hasZombieInRow = zombies.some(z =>
                            z.row === plant.row && z.x > plant.col * CELL_WIDTH
                        );

                        if (hasZombieInRow) {
                            // 玉米加农炮一次发射两发炮弹
                            if (plant.type.special === 'explosion') {
                                const bulletData1 = {
                                    x: plant.col * CELL_WIDTH + CELL_WIDTH - 20,
                                    y: plant.row * CELL_HEIGHT + CELL_HEIGHT / 2 - 10,
                                    row: plant.row,
                                    damage: plant.type.attackDamage,
                                    speed: 300,
                                    special: plant.type.special
                                };
                                const bulletData2 = {
                                    x: plant.col * CELL_WIDTH + CELL_WIDTH - 20,
                                    y: plant.row * CELL_HEIGHT + CELL_HEIGHT / 2 + 10,
                                    row: plant.row,
                                    damage: plant.type.attackDamage,
                                    speed: 300,
                                    special: plant.type.special
                                };
                                bullets.push(bulletData1);
                                bullets.push(bulletData2);
                            } else {
                                // 豌豆射手正常发射一发炮弹
                                const bulletData = {
                                    x: plant.col * CELL_WIDTH + CELL_WIDTH - 20,
                                    y: plant.row * CELL_HEIGHT + CELL_HEIGHT / 2,
                                    row: plant.row,
                                    damage: plant.type.attackDamage,
                                    speed: 300,
                                    special: plant.type.special
                                };
                                bullets.push(bulletData);
                            }
                        }
                    }
                }
            });

            // 更新僵尸
            zombies.forEach(zombie => {
                let canMove = true;
                
                // 检查是否与植物碰撞
                plants.forEach(plant => {
                    if (plant.row === zombie.row &&
                        zombie.x > plant.col * CELL_WIDTH &&
                        zombie.x < (plant.col + 1) * CELL_WIDTH) {
                        canMove = false;
                        
                        // 僵尸攻击植物
                        zombie.attackTimer += deltaTime;
                        if (zombie.attackTimer >= zombie.attackSpeed) {
                            zombie.attackTimer = 0;
                            plant.health -= zombie.attackDamage;
                            
                            if (plant.health <= 0) {
                                plants = plants.filter(p => p !== plant);
                            }
                        }
                    }
                });
                
                if (canMove) {
                    zombie.x -= zombie.speed * deltaTime / 1000;
                }
                
                // 检查是否到达左侧
                if (zombie.x < 0) {
                    gameOver(false);
                }
            });

            // 更新子弹
            bullets.forEach(bullet => {
                bullet.x += bullet.speed * deltaTime / 1000;

                // 检查是否击中僵尸
                zombies.forEach(zombie => {
                    if (zombie.row === bullet.row &&
                        bullet.x > zombie.x - 30 &&
                        bullet.x < zombie.x + 30) {

                        // 玉米加农炮的爆炸效果
                        if (bullet.special === 'explosion') {
                            const explosionRadius = 100;
                            zombies.forEach(z => {
                                const dx = z.x - bullet.x;
                                const dy = (z.y + CELL_HEIGHT / 2) - bullet.y;
                                const distance = Math.sqrt(dx * dx + dy * dy);
                                if (distance < explosionRadius) {
                                    z.health -= bullet.damage;
                                    if (z.health <= 0) {
                                        zombies = zombies.filter(zombie => zombie !== z);
                                        zombiesKilled++;
                                        score += 100;
                                    }
                                }
                            });
                            bullet.hit = true;
                        } else {
                            // 普通子弹
                            zombie.health -= bullet.damage;
                            bullet.hit = true;

                            if (zombie.health <= 0) {
                                zombies = zombies.filter(z => z !== zombie);
                                zombiesKilled++;
                                score += 100;
                            }
                        }
                        updateUI();
                    }
                });
            });

            // 移除击中的子弹
            bullets = bullets.filter(b => !b.hit && b.x < canvas.width);

            // 更新阳光
            suns.forEach(sun => {
                sun.lifeTime += deltaTime;
                if (sun.targetY !== null && sun.y < sun.targetY) {
                    sun.y += 100 * deltaTime / 1000;
                }

                // 自动收集阳光：存在5秒后自动收集
                if (sun.lifeTime >= 5000) {
                    sun += sun.value;
                    sun.autoCollected = true;
                }
            });

            // 移除过期的阳光和已自动收集的阳光
            suns = suns.filter(s => s.lifeTime < 8000 && !s.autoCollected);

            // 准备时间倒计时
            if (preparationTime > 0) {
                preparationTime -= deltaTime;
                // 准备时间结束，开始第1波
                if (preparationTime <= 0) {
                    preparationTime = 0;
                    nextWave();
                }
            }

            // 生成僵尸（只有在准备时间结束后才开始）
            if (preparationTime <= 0 && zombiesInWave > 0) {
                spawnTimer += deltaTime;
                if (zombiesSpawnedInWave < zombiesInWave && spawnTimer >= 2000) {
                    spawnTimer = 0;
                    spawnZombie();
                    zombiesSpawnedInWave++;
                }
            }

            // 自动生成阳光
            sunSpawnTimer += deltaTime;
            if (sunSpawnTimer >= 8000) {
                sunSpawnTimer = 0;
                const x = Math.random() * (canvas.width - 100) + 50;
                const targetY = Math.random() * (canvas.height - 100) + 50;
                createSun(x, 0, targetY);
            }

            // 检查波次完成
            if (zombiesSpawnedInWave >= zombiesInWave && zombies.length === 0) {
                waveCompleteTimer += deltaTime;
                if (waveCompleteTimer >= 3000) {
                    waveCompleteTimer = 0;
                    nextWave();
                }
            }
        }

        // 创建阳光
        function createSun(x, y, targetY = null) {
            suns.push({
                x: x,
                y: y,
                targetY: targetY,
                value: 50,
                lifeTime: 0
            });
        }

        // 生成僵尸
        function spawnZombie() {
            const row = Math.floor(Math.random() * GRID_ROWS);
            const baseHealth = 100 + currentWave * 20;
            const baseSpeed = 30 + currentWave * 5;

            // 根据波次决定僵尸类型
            let zombieType;
            const random = Math.random();

            if (currentWave >= 3 && random < 0.3) {
                zombieType = ZOMBIE_TYPES.buckethead; // 铁桶僵尸
            } else if (currentWave >= 2 && random < 0.5) {
                zombieType = ZOMBIE_TYPES.conehead; // 路障僵尸
            } else {
                zombieType = ZOMBIE_TYPES.normal; // 普通僵尸
            }

            const health = baseHealth * zombieType.healthMultiplier;
            const speed = baseSpeed * zombieType.speedMultiplier;
            const attackDamage = (10 + currentWave * 2) * zombieType.attackDamageMultiplier;

            zombies.push({
                x: canvas.width,
                y: row * CELL_HEIGHT,
                row: row,
                health: health,
                maxHealth: health,
                speed: speed,
                attackDamage: attackDamage,
                attackSpeed: 1000,
                attackTimer: 0,
                type: zombieType
            });
        }

        // 下一波
        function nextWave() {
            // 检查是否已经完成所有波次
            if (currentWave >= maxWaves) {
                gameOver(true);
                return;
            }

            // 进入下一波
            currentWave++;

            // 根据当前波次计算僵尸数量（第1波有3个，第2波有5个，第3波有7个...）
            zombiesInWave = currentWave * 2 + 1;
            zombiesSpawnedInWave = 0;
            updateUI();
        }

        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格
            initGrid();
            
            // 绘制植物
            plants.forEach(drawPlant);
            
            // 绘制僵尸
            zombies.forEach(drawZombie);
            
            // 绘制子弹
            bullets.forEach(drawBullet);
            
            // 绘制阳光
            suns.forEach(drawSun);
            
            // 绘制准备时间倒计时
            if (preparationTime > 0) {
                const seconds = Math.ceil(preparationTime / 1000);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(canvas.width / 2 - 150, canvas.height / 2 - 40, 300, 80);
                ctx.strokeStyle = '#4CAF50';
                ctx.lineWidth = 3;
                ctx.strokeRect(canvas.width / 2 - 150, canvas.height / 2 - 40, 300, 80);
                
                ctx.fillStyle = '#4CAF50';
                ctx.font = 'bold 28px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('准备时间: ' + seconds + '秒', canvas.width / 2, canvas.height / 2);
            }
            
            // 绘制选中的植物预览
            if (selectedPlant) {
                ctx.globalAlpha = 0.5;
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(selectedPlant.emoji, canvas.width / 2, canvas.height / 2);
                ctx.globalAlpha = 1;
            }
        }

        // 游戏循环
        function gameLoop(timestamp) {
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;
            
            update(deltaTime);
            draw();
            
            if (gameRunning) {
                requestAnimationFrame(gameLoop);
            }
        }

        // 选择植物
        function selectPlant(plantType) {
            if (!gameRunning) return;
            
            const plant = PLANT_TYPES[plantType];
            if (sun >= plant.cost) {
                selectedPlant = plant;
                
                // 更新选中状态
                document.querySelectorAll('.plant-card').forEach(card => {
                    card.classList.remove('selected');
                });
                document.getElementById(plantType + '-card').classList.add('selected');
            }
        }

        // 点击画布
        canvas.addEventListener('click', (e) => {
            if (!gameRunning) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // 检查是否点击了阳光
            let sunClicked = false;
            for (let i = suns.length - 1; i >= 0; i--) {
                const sunObj = suns[i];
                const dx = x - sunObj.x;
                const dy = y - sunObj.y;
                if (Math.sqrt(dx * dx + dy * dy) < 40) {
                    sunClicked = true;
                    break;
                }
            }

            // 如果点击了阳光，收集所有阳光
            if (sunClicked) {
                let totalSun = 0;
                suns.forEach(s => totalSun += s.value);
                sun += totalSun;
                suns = [];
                updateUI();
                return;
            }
            
            // 种植植物
            if (selectedPlant) {
                const col = Math.floor(x / CELL_WIDTH);
                const row = Math.floor(y / CELL_HEIGHT);
                
                // 检查是否在网格内
                if (col >= 0 && col < GRID_COLS && row >= 0 && row < GRID_ROWS) {
                    // 检查是否已经有植物
                    const hasPlant = plants.some(p => p.col === col && p.row === row);
                    
                    if (!hasPlant && sun >= selectedPlant.cost) {
                        sun -= selectedPlant.cost;
                        plants.push({
                            col: col,
                            row: row,
                            type: selectedPlant,
                            health: selectedPlant.health,
                            attackTimer: 0,
                            sunTimer: 0
                        });
                        selectedPlant = null;
                        
                        // 清除选中状态
                        document.querySelectorAll('.plant-card').forEach(card => {
                            card.classList.remove('selected');
                        });
                        
                        updateUI();
                    }
                }
            }
        });

        // 更新UI
        function updateUI() {
            document.getElementById('sunCount').textContent = sun;
            document.getElementById('score').textContent = score;
            document.getElementById('zombiesKilled').textContent = zombiesKilled;
            document.getElementById('plantCount').textContent = plants.length;
            document.getElementById('waveCount').textContent = currentWave;
            
            // 更新植物卡片状态
            Object.keys(PLANT_TYPES).forEach(type => {
                const card = document.getElementById(type + '-card');
                if (sun < PLANT_TYPES[type].cost) {
                    card.classList.add('disabled');
                } else {
                    card.classList.remove('disabled');
                }
            });
        }

        // 开始游戏
        function startGame() {
            if (gameRunning) return;
            
            gameRunning = true;
            sun = 250;
            score = 0;
            zombiesKilled = 0;
            currentWave = 0;
            plants = [];
            zombies = [];
            bullets = [];
            suns = [];
            spawnTimer = 0;
            sunSpawnTimer = 0;
            waveCompleteTimer = 0;
            zombiesInWave = 0;
            zombiesSpawnedInWave = 0;
            preparationTime = 10000; // 10秒准备时间
            
            updateUI();
            document.getElementById('startBtn').textContent = '游戏中...';
            document.getElementById('startBtn').disabled = true;
            
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        // 游戏结束
        function gameOver(win) {
            gameRunning = false;
            
            const overlay = document.getElementById('gameOverOverlay');
            const title = document.getElementById('gameOverTitle');
            const stats = document.getElementById('gameOverStats');
            
            title.textContent = win ? '🎉 胜利！' : '💀 失败！';
            title.className = 'game-over-title ' + (win ? 'win' : 'lose');
            stats.innerHTML = `
                最终得分: ${score}<br>
                击杀僵尸: ${zombiesKilled}<br>
                存活波次: ${currentWave}/${maxWaves}
            `;
            
            overlay.style.display = 'flex';
        }

        // 重新开始
        function restartGame() {
            document.getElementById('gameOverOverlay').style.display = 'none';
            document.getElementById('startBtn').textContent = '开始游戏';
            document.getElementById('startBtn').disabled = false;
            
            // 重置游戏状态
            sun = 250;
            score = 0;
            zombiesKilled = 0;
            currentWave = 0;
            plants = [];
            zombies = [];
            bullets = [];
            suns = [];
            
            updateUI();
            
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            initGrid();
        }

        // 初始化
        initGrid();
        updateUI();
    </script>
</body>
</html>
